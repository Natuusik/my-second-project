<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Журнал наблюдений</title>

    <!-- Стили -->
    <link rel="stylesheet" href="style.css">

    <!-- PDF библиотека -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="DejaVuSans.js"></script>
</head>
<body>

    <h1>Журнал наблюдений</h1>

    <!-- Форма -->
    <div class="card">
        <h2>Добавить / Редактировать запись</h2>

        <input id="name" placeholder="Имя">
        <input id="date" type="date">
        <input id="time" type="time">

        <select id="event" onchange="checkCustomEvent()">
            <option value="Болезнь">Болезнь</option>
            <option value="Встреча с родственниками">Встреча с родственниками</option>
            <option value="Событие">Событие</option>
            <option value="Другое">Другое</option>
            <option value="custom">Своё событие…</option>
        </select>

        <input id="customEvent" placeholder="Введите своё событие" class="hidden">

        <textarea id="notes" placeholder="Комментарий"></textarea>

        <button class="btn primary" onclick="saveEntry()">Сохранить</button>
    </div>

    <!-- Фильтры -->
    <div class="card">
        <h2>Фильтры</h2>

        <input id="filterName" placeholder="Фильтр по имени" oninput="renderTable()">
        <input id="filterDate" type="date" oninput="renderTable()">

        <select id="filterEvent" onchange="renderTable()">
            <option value="">Все события</option>
            <option value="Болезнь">Болезнь</option>
            <option value="Встреча с родственниками">Встреча с родственниками</option>
            <option value="Событие">Событие</option>
            <option value="Другое">Другое</option>
        </select>

        <h3>Экспорт / Импорт</h3>
        <button class="btn green" onclick="exportTXT()">Скачать TXT</button>
        <input type="file" id="importFile" accept=".txt" onchange="importTXT()">

        <h3>PDF</h3>
        <button class="btn purple" onclick="exportDayPDF()">PDF за выбранный день</button>
    </div>

    <!-- Таблица -->
    <h2>Таблица записей</h2>
    <table>
        <thead>
            <tr>
                <th>Имя</th>
                <th>Дата</th>
                <th>Время</th>
                <th>Событие</th>
                <th>Комментарий</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <!-- Скрипт -->
    <script src="script.js"></script>

</body>
</html>
