<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дневник наблюдений</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f5f5f7;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            background: #0078d4;
            padding: 10px;
            gap: 10px;
        }
        .tab {
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
        }
        .tab.active {
            background: white;
            color: #0078d4;
            font-weight: bold;
        }

        /* Основная область */
        .main {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }

        /* Затемнение */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.25); /* лёгкое тёмное затемнение */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* История (выезжающее меню) */
        .dates {
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            height: 100%;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
            transform: translateX(-250px);
            transition: transform 0.3s ease;
            z-index: 20;
        }
        .dates.visible {
            transform: translateX(0);
        }

        .dates h3 {
            margin-top: 0;
        }
        .date-item {
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 5px;
            background: #f0f0f0;
        }
        .date-item:hover {
            background: #e0e0e0;
        }
        .date-item.active {
            background: #0078d4;
            color: white;
        }

        /* Кнопка истории */
        .history-btn {
            position: absolute;
            left: 10px;
            top: 70px;
            z-index: 30;
            background: #444;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Контейнер дневника */
        .container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            position: relative;
            z-index: 10;
        }

        textarea {
            width: 100%;
            min-height: 70px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }
        input[type="date"] {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #005ea6;
        }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchChild('dayana')">Даяна</div>
    <div class="tab" onclick="switchChild('child2')">Ребёнок 2</div>
    <div class="tab" onclick="switchChild('child3')">Ребёнок 3</div>
</div>

<button class="history-btn" onclick="toggleHistory()">История</button>

<div class="main">
    <div class="overlay" id="overlay" onclick="toggleHistory()"></div>

    <div class="dates" id="dates"></div>

    <div class="container">
        <h1 id="childName">Дневник — Даяна</h1>

        <label>Дата:</label><br>
        <input type="date" id="date"><br>

        <h2>1. Образование / учёба</h2>
        <textarea id="edu"></textarea>

        <h2>2. Социальные и эмоциональные навыки</h2>
        <textarea id="social"></textarea>

        <h2>3. Здоровье и самочувствие</h2>
        <textarea id="health"></textarea>

        <h2>4. Дружеские отношения</h2>
        <textarea id="friends"></textarea>

        <h2>5. Контакты с семьёй</h2>
        <textarea id="family"></textarea>

        <h2>6. Свободное время, хобби</h2>
        <textarea id="hobby"></textarea>

        <button onclick="saveEntry()">Сохранить</button>
        <button onclick="prevDay()">Назад</button>
        <button onclick="nextDay()">Следующий день</button>
        <button onclick="downloadEntry()">Скачать запись</button>
    </div>
</div>

<script>
let currentChild = "dayana";
let currentDate = null;

function toggleHistory() {
    document.getElementById("dates").classList.toggle("visible");
    document.getElementById("overlay").classList.toggle("visible");
}

function loadDates() {
    const list = document.getElementById("dates");
    list.innerHTML = "<h3>Записи</h3>";

    const data = JSON.parse(localStorage.getItem(currentChild) || "{}");
    const dates = Object.keys(data).sort().reverse();

    if (dates.length === 0) {
        const empty = document.createElement("div");
        empty.style.color = "#777";
        empty.style.fontSize = "14px";
        empty.style.marginTop = "10px";
        empty.textContent = "Нет записей";
        list.appendChild(empty);
        return;
    }

    dates.forEach(d => {
        const div = document.createElement("div");
        div.className = "date-item" + (d === currentDate ? " active" : "");
        div.textContent = d;
        div.onclick = () => {
            openDate(d);
            toggleHistory();
        };
        list.appendChild(div);
    });
}

function openDate(date) {
    currentDate = date;
    const data = JSON.parse(localStorage.getItem(currentChild) || "{}")[date];

    document.getElementById("date").value = date;
    document.getElementById("edu").value = data.edu;
    document.getElementById("social").value = data.social;
    document.getElementById("health").value = data.health;
    document.getElementById("friends").value = data.friends;
    document.getElementById("family").value = data.family;
    document.getElementById("hobby").value = data.hobby;

    loadDates();
}

function saveEntry() {
    const date = document.getElementById("date").value;
    if (!date) return alert("Выберите дату");

    currentDate = date;

    const entry = {
        edu: document.getElementById("edu").value,
        social: document.getElementById("social").value,
        health: document.getElementById("health").value,
        friends: document.getElementById("friends").value,
        family: document.getElementById("family").value,
        hobby: document.getElementById("hobby").value
    };

    const data = JSON.parse(localStorage.getItem(currentChild) || "{}");
    data[date] = entry;
    localStorage.setItem(currentChild, JSON.stringify(data));

    loadDates();
}

function nextDay() {
    let d = new Date(currentDate || new Date());
    d.setDate(d.getDate() + 1);
    const next = d.toISOString().split("T")[0];

    currentDate = next;
    document.getElementById("date").value = next;

    document.querySelectorAll("textarea").forEach(t => t.value = "");
    loadDates();
}

function prevDay() {
    let d = new Date(currentDate || new Date());
    d.setDate(d.getDate() - 1);
    const prev = d.toISOString().split("T")[0];

    currentDate = prev;
    document.getElementById("date").value = prev;

    const data = JSON.parse(localStorage.getItem(currentChild) || "{}");
    if (data[prev]) openDate(prev);
    else document.querySelectorAll("textarea").forEach(t => t.value = "");

    loadDates();
}

function switchChild(child) {
    currentChild = child;
    currentDate = null;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");

    document.getElementById("childName").textContent =
        "Дневник — " + (child === "dayana" ? "Даяна" : child === "child2" ? "Ребёнок 2" : "Ребёнок 3");

    document.querySelectorAll("textarea").forEach(t => t.value = "");
    document.getElementById("date").value = "";

    loadDates();
}

function downloadEntry() {
    if (!currentDate) return alert("Нет выбранной даты");

    const data = JSON.parse(localStorage.getItem(currentChild) || "{}")[currentDate];
    if (!data) return alert("Запись пустая");

    const text =
`Ребёнок: ${currentChild}
Дата: ${currentDate}

1. Образование:
${data.edu}

2. Социальные навыки:
${data.social}

3. Здоровье:
${data.health}

4. Дружеские отношения:
${data.friends}

5. Контакты с семьёй:
${data.family}

6. Хобби:
${data.hobby}
`;

    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${currentChild}_${currentDate}.txt`;
    a.click();
}

switchChild("dayana");
</script>

</body>
</html>
